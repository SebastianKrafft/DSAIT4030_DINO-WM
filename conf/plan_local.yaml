defaults:
  - _self_
  - override hydra/launcher: basic

hydra:
  run:
    dir: plan_outputs/${now:%Y%m%d%H%M%S}_${replace_slash:${model_name}}_gH${goal_H}

ckpt_base_path: /home/jgilaviles/genmodel/DSAIT4030_DINO-WM/pretrained_ckpts
model_name: point_maze
model_epoch: latest

seed: 42
n_evals: 3
goal_source: 'random_state'
goal_H: 5
n_plot_samples: 3

debug_dset_init: False

objective:
  _target_: planning.objectives.create_objective_fn
  alpha: 0
  base: 2
  mode: last

planner:
  _target_: planning.mpc.MPCPlanner
  max_iter: null
  n_taken_actions: 5
  sub_planner:
    target: planning.cem.CEMPlanner
    horizon: 5
    topk: 30
    num_samples: 100
    var_scale: 1
    opt_steps: 5
    eval_every: 1
  name: mpc_cem
